name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - "themes/verdant-phosphor.json"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          RELEASE_BRANCHES: main

      - name: Sync extension.toml version
        run: |
          VERSION="${{ steps.tag.outputs.new_tag }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" extension.toml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extension.toml
          git commit -m "Sync extension.toml to ${VERSION}" || true
          git push || true

      - name: Package theme
        run: |
          mkdir -p dist/themes
          cp themes/verdant-phosphor.json dist/themes/
          cp extension.toml dist/
          cp LICENSE dist/
          cp README.md dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: "Verdant Phosphor ${{ steps.tag.outputs.new_tag }}"
          body: |
            ## ✦ Verdant Phosphor ${{ steps.tag.outputs.new_tag }}

            Automatic release — the theme file was updated.

            ### Installation
            ```sh
            mkdir -p ~/.config/zed/themes
            cp themes/verdant-phosphor.json ~/.config/zed/themes/
            ```

            Then **Cmd + K, Cmd + T** inside Zed.
          files: dist/*
          generate_release_notes: true
